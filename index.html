<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linsen Studio</title>
  <meta name="description" content="Linsen Studio — Visual Production & Brand Design. Coming Soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&family=DM+Mono:wght@300;400&family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #111418;
      --text-primary: #d4d4d4;
      --text-mid: #6a7585;
      --text-dim: #556070;
      --overlay: rgba(14, 17, 22, 0.50);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* Background image */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Dark overlay */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--overlay);
    }

    /* Noise texture */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.035;
    }

    /* Main layout */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 4rem;
    }

    /* Top bar */
    .top {
      font-size: 14px;
      letter-spacing: 0.19em;
      color: var(--text-mid);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.2s;
    }

    /* Center */
    .center {
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.6s;
    }

    .main-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(56px, 8vw, 96px);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: 0em;
      color: var(--text-primary);
    }

    .subtitle {
      font-family: 'Noto Serif SC', serif;
      font-size: 13px;
      color: var(--text-mid);
      letter-spacing: 0.12em;
      margin-top: 1.2rem;
      font-weight: 300;
    }

    /* Bottom bar */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 1s;
    }

    .email {
      font-size: 13px;
      color: var(--text-mid);
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .email:hover {
      color: var(--text-primary);
    }

    .year {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-align: right;
      line-height: 1.7;
    }

    /* Animation */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .page {
        padding: 2rem 2rem;
      }

      .main-title {
        font-size: 52px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <svg class="noise" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <div class="page">

    <div class="top">Linsen Studio</div>

    <div class="center">
      <h1 class="main-title">Coming<br>Soon</h1>
      <p class="subtitle">視覺創作　品牌設計</p>
    </div>

    <div class="bottom">
      <a class="email" href="mailto:hello@linsen.studio">hello@linsen.studio</a>
      <div class="year">MMXXVI<br>2026</div>
    </div>

  </div>

</body>
</html>
